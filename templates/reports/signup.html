{% load static %}
<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Signup</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url("{% static 'images/login.jpg' %}") no-repeat center center fixed;  /* ✅ same background as login */
            background-size: cover;
            font-family: Arial, sans-serif;
        }
        .signup-box {
            background: rgba(255,255,255,0.85);  /* ✅ slightly transparent so background shows through */
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            width: 380px;
            text-align: center;
            animation: fadeIn 0.6s ease;  /* ✅ smooth fade-in */
        }
        h2 { margin-bottom: 20px; color: #222; font-weight: bold; }
        button {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        button:hover { background-color: #555; }
        .switch-links { margin-top: 15px; }
        .switch-links a { color: #333; text-decoration: none; font-weight: bold; }
        .switch-links a:hover { text-decoration: underline; }

        /* ✅ Fade-in animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="signup-box">
        <h2>Create Your Account</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Signup</button>
        </form>
        <div class="switch-links">
            Already have an account? <a href="{% url 'login' %}">Login</a>
        </div>
    </div>
</body>
</html>
